name: ML Tests (anomalib)

on:
  push:
    paths:
      - 'tests/unit/test_patchcore_memory_bank.py'
      - 'utils/model_factory.py'
  pull_request:
    paths:
      - 'tests/unit/test_patchcore_memory_bank.py'
      - 'utils/model_factory.py'

jobs:
  ml-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-anomalib2.4.1-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ml-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install anomalib==2.4.1
          pip install pytest pytest-cov

      - name: Run PatchCore memory bank tests
        run: |
          pytest tests/unit/test_patchcore_memory_bank.py -v --tb=short
