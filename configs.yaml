experiment:
  name: null
  created_at: null

preprocessing:
  method: none
  resize_mode: padding
  image_size: 256
  normalization: imagenet
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  params: null

model:
  model_type: efficientad
  image_size: 256
  batch_size: 16
  random_seed: 42
  threshold_method: percentile
  threshold_value: 95.0
  params:
    # EfficientAD 기본값 (00_Global_Context §1.4)
    model_size: medium
    train_steps: 70000
    optimizer: adam
    learning_rate: 0.0001
    weight_decay: 0.0001
    out_channels: 384
    padding: false
    ae_loss_weight: 0.5
    st_loss_weight: 0.5
    autoencoder_lr: 0.0001
    autoencoder_weight_decay: 1.0e-05
    lr_decay_epochs: 50000
    lr_decay_factor: 0.1
    scheduler: StepLR
    imagenet_penalty_weight: 1.0
    penalty_batch_size: 8
