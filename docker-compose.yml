version: "3.8"

# GPU 전용 오버라이드
# 실행: docker compose -f docker-compose.base.yml -f docker-compose.yml up -d

services:
  smart-qc:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: 0
